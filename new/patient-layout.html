<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Layout</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1e2330;
    font-family: 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px 12px 64px;
    color: #e5e7eb;
  }

  /* ── Header ── */
  .app-header {
    width: 100%;
    max-width: 1400px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding: 0 4px;
  }
  .app-header img.logo {
    height: 44px;
    object-fit: contain;
  }
  .app-title {
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 1px;
    text-align: center;
  }
  .app-title span { color: #f59e0b; }

  .icon-btn {
    background: #374151;
    border: 1.5px solid #4b5563;
    border-radius: 8px;
    color: #d1d5db;
    font-size: 13px;
    font-weight: 700;
    height: 36px;
    padding: 0 12px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
    text-decoration: none;
    white-space: nowrap;
  }
  .icon-btn:hover { background: #4b5563; color: #fff; }

  /* ── Main content row: room + info panel ── */
  #content-row {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    gap: 4px;
    width: 100%;
    max-width: 1400px;
  }

  /* ── Room outer ── */
  #room-outer {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 0 0 auto;
    width: 24.5vw;
    max-width: 340px;
  }

  /* ── 4×2 bed grid — 70% of available width (30% reduction) ── */
  #room-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, auto);
    column-gap: 10px;
    row-gap: 61px;
    width: 100%;
    background: #111827;
    border-radius: 12px;
    border: 1.5px solid #4b5563;
    padding: 12px 12px calc(12px + 61px);
  }

  /* ── Individual bed cell ── */
  .bed-cell {
    position: relative;
    border-radius: 8px;
    overflow: visible;
    background: #1e2330;
    border: 1px solid #374151;
    /* Maintain bed aspect ratio (350 × 854) */
    aspect-ratio: 350 / 854;
  }
  .bed-cell > img.bed-bg {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: fill;
    pointer-events: none;
  }

  /* Bed number badge — top-right corner */
  .bed-num {
    position: absolute;
    top: 4px;
    right: 5px;
    font-size: clamp(8px, 1vw, 11px);
    font-weight: 800;
    color: #fff;
    background: rgba(30,35,48,0.82);
    padding: 1px 5px;
    border-radius: 4px;
    pointer-events: none;
    z-index: 5;
    letter-spacing: 0.3px;
  }

  /* ── Patient GIF overlaid on the bed cell ── */
  .bed-gif {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;
    pointer-events: none;
    z-index: 2;
  }

  /* ── Clickable transparent hit-area ── */
  .bed-link {
    position: absolute;
    inset: 0;
    display: block;
    cursor: pointer;
    z-index: 10;
    border-radius: 6px;
    text-decoration: none;
    background: transparent;
    transition: box-shadow 0.15s, background 0.15s;
  }
  .bed-link:hover {
    background: rgba(251,191,36,0.08);
    box-shadow: inset 0 0 0 2px #f59e0b;
  }

  /* ── Patient info label — sits just below the bed cell, in the walkway ── */
  .bed-label {
    position: absolute;
    top: calc(100% + 6px);
    left: 0;
    right: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    pointer-events: none;
    padding: 0 3px;
    z-index: 6;
  }
  .bed-label .pname {
    font-size: clamp(8px, 1.1vw, 12px);
    font-weight: 900;
    padding: 1px 6px;
    border-radius: 4px;
    line-height: 1.2;
    text-align: center;
    white-space: nowrap;
    letter-spacing: 0.5px;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .bed-label .tag {
    font-size: clamp(7px, 0.9vw, 10px);
    font-weight: 700;
    color: #fff;
    background: rgba(30,35,48,0.88);
    padding: 1px 5px;
    border-radius: 4px;
    white-space: nowrap;
    text-align: center;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .bed-label .pmeta {
    font-size: clamp(6px, 0.8vw, 9px);
    color: #d1d5db;
    background: rgba(30,35,48,0.80);
    padding: 0 5px;
    border-radius: 3px;
    white-space: nowrap;
    text-align: center;
    line-height: 1.4;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Med-tag colour coding */
  .tag-T1      { background: #dc2626; color: #fff; }
  .tag-T2      { background: #d97706; color: #fff; }
  .tag-T3      { background: #16a34a; color: #fff; }
  .tag-T4      { background: #374151; color: #9ca3af; border: 1px solid #4b5563; }
  .tag-default { background: #1e3a5f; color: #93c5fd; border: 1px solid #3b82f6; }

  /* Empty bed label */
  .bed-label.empty .tag {
    background: rgba(55,65,81,0.7);
    color: #6b7280;
    border: 1px dashed #4b5563;
  }
  .bed-label.empty .pname,
  .bed-label.empty .pmeta { display: none; }

  /* ── No-data notice ── */
  .no-data {
    margin-top: 16px;
    font-size: 13px;
    color: #6b7280;
    font-style: italic;
  }

  /* ═══════════════════════════════════════════
     SESSION INFO PANEL (right side)
  ═══════════════════════════════════════════ */
  #session-panel {
    flex: 0 0 auto;
    width: 312px;
    background: #1f2937;
    border: 1.5px solid #374151;
    border-radius: 12px;
    overflow: hidden;
    align-self: flex-start;
  }

  #panel-header {
    background: #374151;
    border-bottom: 1.5px solid #4b5563;
    color: #d1d5db;
    font-size: 12px;
    font-weight: 700;
    padding: 8px 10px;
    letter-spacing: 0.5px;
  }

  #panel-body {
    padding: 12px 12px 14px;
  }

  .info-section {
    margin-bottom: 14px;
  }
  .info-section:last-child { margin-bottom: 0; }

  .info-section-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #f59e0b;
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid #374151;
  }

  .info-row {
    display: flex;
    flex-direction: column;
    gap: 1px;
    margin-bottom: 8px;
  }
  .info-row:last-child { margin-bottom: 0; }
  .info-row .info-key {
    font-size: 10px;
    color: #6b7280;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .info-row .info-val {
    font-size: 12px;
    color: #e5e7eb;
    font-weight: 600;
    word-break: break-word;
  }

  /* Status badge */
  .status-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 1px 8px;
    border-radius: 20px;
  }
  .status-active   { background: #14532d; color: #86efac; }
  .status-ended,
  .status-completed,
  .status-finished { background: #1e3a5f; color: #93c5fd; }
  .status-inactive { background: #374151; color: #9ca3af; }
  .status-unknown  { background: #292524; color: #a8a29e; }

  /* Participant list */
  .participant-item {
    background: #111827;
    border: 1px solid #374151;
    border-radius: 6px;
    padding: 7px 8px;
    margin-bottom: 6px;
  }
  .participant-item:last-child { margin-bottom: 0; }
  .participant-name {
    font-weight: 700;
    color: #e5e7eb;
    margin-bottom: 5px;
    font-size: 12px;
  }
  .participant-field {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 6px;
    margin-bottom: 2px;
    font-size: 10px;
  }
  .participant-field:last-child { margin-bottom: 0; }
  .participant-field .pf-key {
    color: #6b7280;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    flex-shrink: 0;
  }
  .participant-field .pf-val {
    color: #d1d5db;
    font-weight: 500;
    text-align: right;
    word-break: break-word;
  }

  .no-participants {
    font-size: 11px;
    color: #4b5563;
    font-style: italic;
  }

  /* ── Bottom nav ── */
  #bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 44px;
    background: #1f2937;
    border-top: 1px solid #4b5563;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    z-index: 9998;
  }
  #bottom-nav .nav-link {
    display: flex;
    align-items: center;
    gap: 7px;
    background: #374151;
    border: 1.5px solid #6b7280;
    border-radius: 10px;
    color: #d1d5db;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    padding: 0 14px;
    height: 32px;
    letter-spacing: 0.5px;
    transition: background 0.15s, color 0.15s;
  }
  #bottom-nav .nav-link:hover { background: #4b5563; color: #fff; }
  #bottom-nav .nav-link .nav-icon {
    width: 22px; height: 22px;
    background: #6b7280;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  #bottom-nav .nav-link .nav-icon svg { fill: #fff; }
  #fullscreen-btn {
    background: #374151;
    color: #f3f4f6;
    border: 1.5px solid #6b7280;
    border-radius: 8px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #fullscreen-btn:hover { background: #4b5563; }
</style>
</head>
<body>

<!-- Header -->
<div class="app-header">
  <a href="index.html" title="Back to Main Menu">
    <img class="logo" src="Pics/logo.png" alt="Logo" onerror="this.style.display='none'">
  </a>
  <div class="app-title">Patient <span>Layout</span></div>
  <a class="icon-btn" href="MCI-sessions.html" title="Back to Sessions">Return to Sessions</a>
</div>

<!-- Main row: bed grid left, session info panel right -->
<div id="content-row">

  <!-- 4×2 bed grid -->
  <div id="room-outer">
    <div id="room-grid">
      <!-- Row 1: bed-01 … bed-03 -->
      <div class="bed-cell" id="bed-01">
        <img class="bed-bg" src="Pics/1-patient-bed_top-view.gif" alt="Bed 01">
        <span class="bed-num">01</span>
      </div>
      <div class="bed-cell" id="bed-02">
        <img class="bed-bg" src="Pics/1-patient-bed_top-view.gif" alt="Bed 02">
        <span class="bed-num">02</span>
      </div>
      <div class="bed-cell" id="bed-03">
        <img class="bed-bg" src="Pics/1-patient-bed_top-view.gif" alt="Bed 03">
        <span class="bed-num">03</span>
      </div>
      <!-- Row 2: bed-04 … bed-06 -->
      <div class="bed-cell" id="bed-04">
        <img class="bed-bg" src="Pics/1-patient-bed_top-view.gif" alt="Bed 04">
        <span class="bed-num">04</span>
      </div>
      <div class="bed-cell" id="bed-05">
        <img class="bed-bg" src="Pics/1-patient-bed_top-view.gif" alt="Bed 05">
        <span class="bed-num">05</span>
      </div>
      <div class="bed-cell" id="bed-06">
        <img class="bed-bg" src="Pics/1-patient-bed_top-view.gif" alt="Bed 06">
        <span class="bed-num">06</span>
      </div>
    </div>
    <div class="no-data" id="no-data" style="display:none;">No patient data received. Open this page from a session card.</div>
  </div>

  <!-- Session info panel -->
  <div id="session-panel">
    <div id="panel-header">Session Info</div>
    <div id="panel-body">
      <!-- Filled by JS -->
    </div>
  </div>

</div><!-- #content-row -->

<script>
/* ═══════════════════════════════════════════════════════
   BED CELLS — 6 cells, IDs bed-01 … bed-06
   Overlays are injected directly into each .bed-cell
   (no source-image pixel math needed — each cell IS the bed)
════════════════════════════════════════════════════════ */
const BED_IDS = ['bed-01','bed-02','bed-03','bed-04','bed-05','bed-06','bed-07','bed-08'];

/* Derive the patient GIF path from casualtyId.
   e.g. "m01" / "M01" → Pics/M01_TopBody.gif */
function gifPath(casualtyId) {
  if (!casualtyId) return null;
  const m = String(casualtyId).trim().match(/^([mMfF])(\d+)$/);
  if (!m) return null;
  return `Pics/${m[1].toUpperCase()}${m[2].padStart(2,'0')}_TopBody.gif`;
}

function tagClass(medTag) {
  const t = String(medTag).trim().toUpperCase();
  if (t === 'T1' || t === 'IMMEDIATE' || t === 'RED')    return 'tag-T1';
  if (t === 'T2' || t === 'DELAYED'   || t === 'YELLOW') return 'tag-T2';
  if (t === 'T3' || t === 'MINOR'     || t === 'GREEN')  return 'tag-T3';
  if (t === 'T4' || t === 'EXPECTANT' || t === 'BLACK')  return 'tag-T4';
  return 'tag-default';
}

let _patients = [];

function renderOverlays(patients) {
  _patients = patients;

  BED_IDS.forEach((bedId, i) => {
    const cell = document.getElementById(bedId);
    if (!cell) return;

    // Remove any previously injected overlays (keep .bed-bg and .bed-num)
    cell.querySelectorAll('.bed-gif, .bed-link, .bed-label').forEach(el => el.remove());

    const p = patients[i] || null;

    /* ── 1. Patient GIF — fills the whole cell ── */
    if (p && p.casualtyId) {
      const src = gifPath(p.casualtyId);
      if (src) {
        const gif = document.createElement('img');
        gif.className = 'bed-gif';
        gif.src = src;
        gif.alt = p.name || '';
        cell.appendChild(gif);
      }

      /* ── 2. Clickable hit-area → dashboard tab ── */
      const key = String(p.casualtyId).trim().toLowerCase();
      const link = document.createElement('a');
      link.className = 'bed-link';
      link.href = 'dashboard.html?patient=' + encodeURIComponent(key);
      link.title = 'View ' + (p.name || key) + ' in Dashboard';
      cell.appendChild(link);
    }

    /* ── 3. Name / med-tag / wave label at the bottom of the cell ── */
    const label = document.createElement('div');
    label.className = 'bed-label' + (p ? '' : ' empty');

    if (p) {
      const nameEl = document.createElement('div');
      nameEl.className = 'pname';
      nameEl.textContent = p.name || '—';
      label.appendChild(nameEl);

      const tagEl = document.createElement('div');
      tagEl.className = 'tag ' + tagClass(p.medTag);
      tagEl.textContent = p.medTag || '—';
      label.appendChild(tagEl);

      if (p.waveId != null && p.waveId !== '') {
        const waveEl = document.createElement('div');
        waveEl.className = 'pmeta';
        waveEl.textContent = '(Wave: ' + p.waveId + ')';
        label.appendChild(waveEl);
      }
    } else {
      const tagEl = document.createElement('div');
      tagEl.className = 'tag tag-T4';
      tagEl.textContent = 'Empty';
      label.appendChild(tagEl);
    }
    cell.appendChild(label);
  });
}

/* ═══════════════════════════════════════════
   SESSION INFO PANEL
═══════════════════════════════════════════ */
function escHtml(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatDate(iso) {
  if (!iso) return '—';
  try {
    const d = new Date(iso);
    return isNaN(d) ? iso : d.toLocaleString(undefined, {
      year: 'numeric', month: 'short', day: '2-digit',
      hour: '2-digit', minute: '2-digit'
    });
  } catch { return iso; }
}

function statusBadge(status) {
  const s = String(status || 'unknown').toLowerCase();
  const cls = ['active','ended','completed','finished','inactive'].includes(s) ? 'status-' + s : 'status-unknown';
  return `<span class="status-badge ${cls}">${escHtml(status || 'unknown')}</span>`;
}

function renderSessionPanel(session) {
  const body = document.getElementById('panel-body');
  if (!session) {
    body.innerHTML = '<p class="no-participants">No session data available.</p>';
    return;
  }

  const participants = Array.isArray(session.participants) ? session.participants : [];

  function pField(key, val) {
    if (val == null || val === '' || val === '—') return '';
    return `<div class="participant-field">
      <span class="pf-key">${escHtml(key)}</span>
      <span class="pf-val">${escHtml(String(val))}</span>
    </div>`;
  }

  let participantsHtml = '';
  if (participants.length === 0) {
    participantsHtml = '<p class="no-participants">No participants recorded.</p>';
  } else {
    participantsHtml = participants.map((p, idx) => {
      if (typeof p === 'string') {
        return `<div class="participant-item"><div class="participant-name">${escHtml(p)}</div></div>`;
      }
      const firstName   = p.firstName   || p.firstname   || p.first_name  || '';
      const lastName    = p.lastName    || p.lastname    || p.last_name   || '';
      const fullName    = [firstName, lastName].filter(Boolean).join(' ')
                         || p.name || p.username || p.displayName || `Participant ${idx + 1}`;
      const traineeIdNo = p.traineeIdNo || p.traineeId   || p.traineeidno || p.trainee_id || '';
      const role        = p.role        || p.type        || '';
      return `
        <div class="participant-item">
          <div class="participant-name">${escHtml(fullName)}</div>
          ${pField('Trainee ID', traineeIdNo)}
          ${pField('First Name', firstName)}
          ${pField('Last Name',  lastName)}
          ${pField('Role',       role)}
        </div>`;
    }).join('');
  }

  body.innerHTML = `
    <div class="info-section">
      <div class="info-section-title">Session</div>
      <div class="info-row">
        <span class="info-key">ID</span>
        <span class="info-val">${escHtml(session.id || '—')}</span>
      </div>
      <div class="info-row">
        <span class="info-key">Status</span>
        <span class="info-val">${statusBadge(session.status)}</span>
      </div>
      <div class="info-row">
        <span class="info-key">Scenario</span>
        <span class="info-val">${escHtml(session.scenarioTitle || '—')}</span>
      </div>
      <div class="info-row">
        <span class="info-key">Scheduled</span>
        <span class="info-val">${escHtml(formatDate(session.scheduledAt))}</span>
      </div>
      <div class="info-row">
        <span class="info-key">Ended</span>
        <span class="info-val">${escHtml(formatDate(session.endAt))}</span>
      </div>
    </div>
    <div class="info-section">
      <div class="info-section-title">Participants (${participants.length})</div>
      ${participantsHtml}
    </div>`;
}

/* ── Load data from sessionStorage ── */
window.addEventListener('DOMContentLoaded', () => {
  // --- Session metadata ---
  try {
    const rawSession = sessionStorage.getItem('roomSession');
    renderSessionPanel(rawSession ? JSON.parse(rawSession) : null);
  } catch (e) {
    renderSessionPanel(null);
  }

  // --- Patient overlays ---
  const raw = sessionStorage.getItem('roomPatients');
  if (!raw) {
    document.getElementById('no-data').style.display = 'block';
    renderOverlays([]);
    return;
  }
  try {
    const patients = JSON.parse(raw);
    renderOverlays(patients);
  } catch (e) {
    document.getElementById('no-data').style.display = 'block';
    renderOverlays([]);
  }
});

function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}
</script>

<div id="bottom-nav">
  <a class="nav-link" href="index.html" title="Open Triage Menu">
    <span class="nav-icon">
      <svg width="13" height="13" viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
    </span>
    Menu
  </a>
  <a class="nav-link" href="dashboard.html" title="Open Patient Dashboard">
    <span class="nav-icon">
      <svg width="13" height="13" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
    </span>
    Dashboard
  </a>
  <a class="nav-link" href="MCI-sessions.html" title="Open MCI Sessions">
    <span class="nav-icon">
      <svg width="13" height="13" viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
    </span>
    Sessions
  </a>
  <button id="fullscreen-btn" title="Toggle Fullscreen" onclick="toggleFullscreen()">&#x26F6;</button>
</div>

</body>
</html>
