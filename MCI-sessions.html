<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCI – Sessions</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #1e2330;
    font-family: 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px 12px 64px;
    color: #e5e7eb;
  }

  /* ── Header ── */
  .app-header {
    width: 100%;
    max-width: 1100px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    padding: 0 4px;
  }
  .app-header img.logo {
    height: 44px;
    object-fit: contain;
  }
  .app-title {
    font-size: 22px;
    font-weight: 800;
    color: #fff;
    letter-spacing: 1px;
    text-align: center;
  }
  .app-title span { color: #f59e0b; }
  .header-right { display: flex; gap: 8px; }
  .icon-btn {
    background: #374151;
    border: 1.5px solid #4b5563;
    border-radius: 8px;
    color: #d1d5db;
    font-size: 16px;
    width: 36px; height: 36px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .icon-btn:hover { background: #4b5563; color: #fff; }

  /* ── Refresh button ── */
  .btn-refresh {
    background: #f59e0b;
    border: none;
    border-radius: 8px;
    color: #1f2937;
    font-size: 13px;
    font-weight: 700;
    padding: 8px 16px;
    cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    transition: background 0.15s;
    white-space: nowrap;
    margin: 0 0 14px auto;
  }
  .btn-refresh:hover { background: #fbbf24; }
  .btn-refresh:disabled { background: #374151; color: #6b7280; cursor: default; }

  /* ── State messages ── */
  .state-box {
    width: 100%;
    max-width: 1100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    background: #2d3748;
    border: 1.5px solid #374151;
    border-radius: 12px;
    gap: 12px;
  }
  .state-box .state-icon { font-size: 40px; }
  .state-box .state-text { font-size: 15px; color: #9ca3af; }
  .state-box .state-err { font-size: 12px; color: #f87171; font-family: monospace; max-width: 600px; text-align: center; }
  .spinner {
    width: 36px; height: 36px;
    border: 4px solid #374151;
    border-top-color: #f59e0b;
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Session cards grid ── */
  .sessions-grid {
    width: 100%;
    max-width: 1100px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(330px, 1fr));
    gap: 12px;
  }

  /* ── Session card ── */
  .sess-card {
    background: #2d3748;
    border: 1.5px solid #4b5563;
    border-radius: 12px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.12s;
  }
  .sess-card:hover { border-color: #f59e0b; transform: translateY(-2px); }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
  }
  .card-avatar {
    width: 42px; height: 42px;
    border-radius: 10px;
    background: #374151;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    flex-shrink: 0;
    text-decoration: none;
    transition: background 0.15s, transform 0.12s;
  }
  .card-avatar:hover { background: #4b5563; transform: scale(1.12); }
  .card-main { flex: 1; min-width: 0; }
  .card-title {
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-id {
    font-size: 11px;
    color: #6b7280;
    font-family: monospace;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-badge-row {
    display: flex;
    gap: 5px;
    margin-top: 6px;
    flex-wrap: wrap;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
  }
  .pill-active   { background: #064e3b; color: #6ee7b7; border: 1px solid #059669; }
  .pill-inactive { background: #1f2937; color: #9ca3af; border: 1px solid #374151; }
  .pill-ended    { background: #1e3a5f; color: #93c5fd; border: 1px solid #3b82f6; }
  .pill-unknown  { background: #2d1e3a; color: #c4b5fd; border: 1px solid #7c3aed; }

  /* ── Card body (expand) ── */
  .card-body {
    display: none;
    flex-direction: column;
    border-top: 1px solid #374151;
    padding: 12px 16px 14px;
    gap: 10px;
  }
  .card-body.open { display: flex; }
  .sess-card.expanded { border-color: #f59e0b; }

  /* ── Casualties list ── */
  .cas-title {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #f59e0b;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .cas-title::after { content: ''; flex: 1; height: 1px; background: #374151; }

  .cas-item {
    background: #374151;
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-size: 12px;
  }
  .cas-item + .cas-item { margin-top: 6px; }
  .cas-name {
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 2px;
  }
  .cas-row {
    display: flex;
    gap: 6px;
    color: #9ca3af;
    line-height: 1.4;
  }
  .cas-row .k { min-width: 72px; flex-shrink: 0; }
  .cas-row .v { color: #e5e7eb; font-weight: 600; word-break: break-word; }
  .cas-empty { font-size: 12px; color: #6b7280; font-style: italic; }

  /* ── Tooltip ── */
  [data-tip] { position: relative; cursor: help; }
  [data-tip]:hover::after {
    content: attr(data-tip);
    position: absolute;
    bottom: calc(100% + 6px);
    left: 50%; transform: translateX(-50%);
    background: #1f2937;
    color: #f3f4f6;
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 6px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 99;
    border: 1px solid #4b5563;
  }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    .sessions-grid { grid-template-columns: 1fr; }
    .app-title { font-size: 17px; }
  }
  /* ── Bottom nav ── */
  #bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 44px;
    background: #1f2937;
    border-top: 1px solid #4b5563;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    z-index: 9998;
  }
  #bottom-nav .nav-link {
    display: flex;
    align-items: center;
    gap: 7px;
    background: #374151;
    border: 1.5px solid #6b7280;
    border-radius: 10px;
    color: #d1d5db;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    padding: 0 14px;
    height: 32px;
    letter-spacing: 0.5px;
    transition: background 0.15s, color 0.15s;
  }
  #bottom-nav .nav-link:hover { background: #4b5563; color: #fff; }
  #bottom-nav .nav-link .nav-icon {
    width: 22px; height: 22px;
    background: #6b7280;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  #bottom-nav .nav-link .nav-icon svg { fill: #fff; }
  #fullscreen-btn {
    background: #374151;
    color: #f3f4f6;
    border: 1.5px solid #6b7280;
    border-radius: 8px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #fullscreen-btn:hover { background: #4b5563; }
</style>
</head>
<body>

<!-- Header -->
<div class="app-header">
  <a href="index.html" title="Back to Main Menu">
    <img class="logo" src="Pics/logo.png" alt="Logo" onerror="this.style.display='none'">
  </a>
  <div class="app-title">MCI <span>Sessions</span></div>
  <div class="header-right">
    <button class="icon-btn" title="Toggle Fullscreen" onclick="toggleFullscreen()">⛶</button>
    <button class="icon-btn" title="Refresh Data" onclick="fetchSessions()">↺</button>
  </div>
</div>

<!-- Refresh -->
<button class="btn-refresh" id="refresh-btn" onclick="fetchSessions()">↺ Refresh</button>

<!-- State: Loading / Error / Empty -->
<div class="state-box" id="state-box">
  <div class="spinner"></div>
  <div class="state-text">Fetching sessions…</div>
</div>

<!-- Session Cards -->
<div class="sessions-grid" id="sessions-grid" style="display:none;"></div>

<script>
/* ═══════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════ */
const API_URL  = 'https://mci-dev-ingestion-session-api.258hoh5vztc7.jp-tok.codeengine.appdomain.cloud/v1/sessions?limit=50&skip=0';
const API_KEY  = 'mci_facilitator_Q695tdY_gdMOEmVefzbwgyBSLuy4LzA9G1gdVd1Yu7s';
const TOP_N    = 20;

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */

/* ═══════════════════════════════════════════
   FETCH
═══════════════════════════════════════════ */
async function fetchSessions() {
  showState('loading');
  document.getElementById('sessions-grid').style.display = 'none';
  document.getElementById('refresh-btn').disabled = true;

  try {
    const res = await fetch(API_URL, {
      headers: { 'X-API-Key': API_KEY }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status} ${res.statusText}`);

    const data = await res.json();

    // Support array root OR { sessions: [...] } / { data: [...] } envelopes
    const all = Array.isArray(data) ? data
              : Array.isArray(data.sessions) ? data.sessions
              : Array.isArray(data.data) ? data.data
              : [];

    // Sort latest first, take top 20
    const dateOf = s => new Date(s.scheduleat || s.scheduleAt || s.scheduled_at || s.scheduledAt || s.createdAt || s.created_at || 0);
    const top = all.sort((a, b) => dateOf(b) - dateOf(a)).slice(0, TOP_N);

    renderSessions(top);

  } catch (err) {
    showState('error', err.message);
  } finally {
    document.getElementById('refresh-btn').disabled = false;
  }
}

function renderSessions(sessions) {
  const grid = document.getElementById('sessions-grid');

  if (sessions.length === 0) {
    showState('empty');
    return;
  }

  hideState();
  grid.innerHTML = sessions.map(s => buildCard(s)).join('');
  grid.style.display = 'grid';
}

/* ═══════════════════════════════════════════
   CARD BUILDER
═══════════════════════════════════════════ */
function buildCard(s) {
  const id        = s._id || s.id || s.sessionId || s.session_id || '—';
  const status    = (s.status || s.state || 'unknown').toLowerCase();
  const scheduledAt = s.scheduleat || s.scheduleAt || s.scheduled_at || s.scheduledAt || '';

  const pillClass = status === 'active'   ? 'pill-active'
    : (status === 'ended' || status === 'completed' || status === 'finished') ? 'pill-ended'
    : status === 'inactive' ? 'pill-inactive'
    : 'pill-unknown';

  const avatar = status === 'active' ? '🟢'
    : (status === 'ended' || status === 'completed') ? '🔵'
    : '⚪';

  const scheduledDisplay = scheduledAt ? formatDateFull(scheduledAt) : '—';
  const safeId = CSS.escape(id);

  // Build casualties body
  const casualties = (s.scenario && s.scenario.casualties) || s.casualties || s.casualty || [];
  let casualtiesHtml = '';
  if (Array.isArray(casualties) && casualties.length > 0) {
    const sorted = [...casualties].sort((a, b) => {
      const wa = String(a.waveid || a.waveId || a.wave_id || '');
      const wb = String(b.waveid || b.waveId || b.wave_id || '');
      if (wa !== wb) return wa.localeCompare(wb, undefined, { numeric: true });
      const ma = String(a.medtag || a.medTag || a.med_tag || '');
      const mb = String(b.medtag || b.medTag || b.med_tag || '');
      return ma.localeCompare(mb, undefined, { numeric: true });
    });
    casualtiesHtml = sorted.map(c => {
      const name     = c.name     || c.casualtyName     || '—';
      const casId    = c.casualtyid || c.casualtyId || c.id || '—';
      const waveId   = c.waveid   || c.waveId   || c.wave_id   || '—';
      const medtag   = c.medtag   || c.medTag   || c.med_tag   || '—';
      const gender   = c.gender   || '—';
      const age      = c.age      != null ? c.age : '—';
      const injuries = c.injuries || c.injury   || '';
      return `
      <div class="cas-item">
        <div class="cas-name">${escHtml(name)}</div>
        <div class="cas-row"><span class="k">Casualty ID</span><span class="v">${escHtml(String(casId))}</span></div>
        <div class="cas-row"><span class="k">Wave ID</span><span class="v">${escHtml(String(waveId))}</span></div>
        <div class="cas-row"><span class="k">Med Tag</span><span class="v">${escHtml(String(medtag))}</span></div>
        <div class="cas-row"><span class="k">Gender</span><span class="v">${escHtml(String(gender))}</span></div>
        <div class="cas-row"><span class="k">Age</span><span class="v">${escHtml(String(age))}</span></div>
        ${injuries ? `<div class="cas-row"><span class="k">Injuries</span><span class="v">${escHtml(String(injuries))}</span></div>` : ''}
      </div>`;
    }).join('');
  } else {
    casualtiesHtml = '<div class="cas-empty">No casualty data available.</div>';
  }

  // Serialise sorted casualties for patient-room transfer
  const casualties2 = (s.scenario && s.scenario.casualties) || s.casualties || s.casualty || [];
  const sortedForTransfer = Array.isArray(casualties2) ? [...casualties2].sort((a, b) => {
    const wa = String(a.waveid || a.waveId || a.wave_id || '');
    const wb = String(b.waveid || b.waveId || b.wave_id || '');
    if (wa !== wb) return wa.localeCompare(wb, undefined, { numeric: true });
    const ma = String(a.medtag || a.medTag || a.med_tag || '');
    const mb = String(b.medtag || b.medTag || b.med_tag || '');
    return ma.localeCompare(mb, undefined, { numeric: true });
  }) : [];
  const transferPayload = JSON.stringify(sortedForTransfer.map(c => ({
    name:      c.name || c.casualtyName || '—',
    medTag:    c.medtag || c.medTag || c.med_tag || '—',
    waveId:    c.waveid || c.waveId || c.wave_id || '—',
    casualtyId: c.casualtyid || c.casualtyId || c.id || ''
  })));
  const encodedPayload = encodeURIComponent(transferPayload);

  // Session metadata for patient-layout info panel
  const scenarioTitle  = s.scenarioTitle || s.scenario_title || (s.scenario && s.scenario.title) || (s.scenario && s.scenario.name) || '—';
  const endAt          = s.endat || s.endAt || s.end_at || s.endedAt || s.ended_at || '';
  const participants   = s.participants || s.participant || [];
  const sessionMeta = JSON.stringify({
    id:            id,
    scenarioTitle: scenarioTitle,
    scheduledAt:   scheduledAt,
    endAt:         endAt,
    status:        status,
    participants:  Array.isArray(participants) ? participants : []
  });
  const encodedMeta = encodeURIComponent(sessionMeta);

  return `
  <div class="sess-card" id="card-${safeId}" onclick="toggleCard('${escHtml(id)}')">
    <div class="card-header">
      <a class="card-avatar" href="patient-layout.html" title="Open Patient Room"
         onclick="event.stopPropagation();
           sessionStorage.setItem('roomPatients', decodeURIComponent('${encodedPayload}'));
           sessionStorage.setItem('roomSession',  decodeURIComponent('${encodedMeta}'));">${avatar}</a>
      <div class="card-main">
        <div class="card-title">${escHtml(scheduledDisplay)}</div>
        <div class="card-id">${escHtml(id)}</div>
        <div class="card-badge-row">
          <span class="pill ${pillClass}">${escHtml(status)}</span>
        </div>
      </div>
    </div>
    <div class="card-body" data-id="${escHtml(id)}">
      <div class="cas-title">Casualties</div>
      ${casualtiesHtml}
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════
   TOGGLE CARD EXPAND
═══════════════════════════════════════════ */
function toggleCard(id) {
  const body = document.querySelector(`.card-body[data-id="${id}"]`);
  if (!body) return;
  const card = body.closest('.sess-card');
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  card.classList.toggle('expanded', !isOpen);
}

/* ═══════════════════════════════════════════
   STATE DISPLAY
═══════════════════════════════════════════ */
function showState(type, errMsg) {
  const box = document.getElementById('state-box');
  if (type === 'loading') {
    box.innerHTML = `<div class="spinner"></div><div class="state-text">Fetching sessions from API…</div>`;
  } else if (type === 'error') {
    box.innerHTML = `
      <div class="state-icon">⚠️</div>
      <div class="state-text">Failed to load sessions</div>
      <div class="state-err">${escHtml(errMsg || 'Unknown error')}</div>
      <button class="btn-refresh" style="margin-top:8px" onclick="fetchSessions()">↺ Retry</button>`;
  } else if (type === 'empty') {
    box.innerHTML = `<div class="state-icon">🗂️</div><div class="state-text">No sessions match your filters.</div>`;
  }
  box.style.display = 'flex';
}
function hideState() {
  document.getElementById('state-box').style.display = 'none';
}

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function escHtml(str) {
  return String(str ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function formatDateFull(iso) {
  try {
    const d = new Date(iso);
    return isNaN(d) ? iso : d.toLocaleString(undefined, {
      year:'numeric', month:'short', day:'2-digit',
      hour:'2-digit', minute:'2-digit', second:'2-digit'
    });
  } catch { return iso; }
}
function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}

/* ═══════════════════════════════════════════
   BOOT
═══════════════════════════════════════════ */
fetchSessions();
</script>

<div id="bottom-nav">
  <a class="nav-link" href="index.html" title="Open Triage Menu">
    <span class="nav-icon">
      <svg width="13" height="13" viewBox="0 0 24 24"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
    </span>
    Menu
  </a>
  <a class="nav-link" href="dashboard.html" title="Open Patient Dashboard">
    <span class="nav-icon">
      <svg width="13" height="13" viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
    </span>
    Dashboard
  </a>
  <a class="nav-link" href="patient-layout.html" title="Open Patient Layout">
    <span class="nav-icon">
      <svg width="13" height="13" viewBox="0 0 24 24"><path d="M21 3H3a1 1 0 0 0-1 1v16a1 1 0 0 0 1 1h18a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1zm-1 16H4V5h16v14zM6 7h5v5H6zm7 0h5v2h-5zm0 4h5v2h-5zM6 14h12v3H6z"/></svg>
    </span>
    Layout
  </a>
  <button id="fullscreen-btn" title="Toggle Fullscreen" onclick="toggleFullscreen()">&#x26F6;</button>
</div>

</body>
</html>
