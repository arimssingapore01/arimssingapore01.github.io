<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MCI Menu</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #6b7280;
    font-family: 'Segoe UI', Arial, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 20px 64px;
  }

  /* ── Card shell ── */
  .card {
    background: #4b5563;
    border-radius: 20px;
    width: 900px;
    min-height: 600px;
    position: relative;
    padding: 0;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }

  /* ── Top bar ── */
  .topbar {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    padding: 14px 18px 6px 18px;
    min-height: 70px;
  }
  .topbar-left {
    display: flex;
    gap: 18px;
    align-items: center;
  }
  .topbar-center {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    line-height: 1.2;
  }
  .topbar-center .pat-id {
    font-size: 15px;
    color: #e5e7eb;
  }
  .topbar-center .pat-name {
    font-size: 28px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: 1px;
  }
  .topbar-right {
    display: flex;
    align-items: flex-start;
  }

  .nav-btn {
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 0;
  }
  .nav-btn .icon {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: #6b7280;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .nav-btn .icon svg { fill: #fff; }
  .nav-btn span {
    font-size: 18px;
    color: #d1d5db;
  }

  .minimize-btn {
    background: #9ca3af;
    border: none;
    border-radius: 3px;
    width: 22px;
    height: 18px;
    cursor: pointer;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    margin-top: 6px;
    font-size: 16px;
    font-weight: 700;
    color: #374151;
    line-height: 1;
    padding-bottom: 1px;
  }
  /* ── Restore button (shown after minimise) ── */
  #restore-btn {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: #374151;
    color: #f3f4f6;
    border: 2px solid #6b7280;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    z-index: 9999;
  }
  #restore-btn:hover { background: #4b5563; }

  /* ── Bottom navigation bar ── */
  #bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 44px;
    background: #1f2937;
    border-top: 1px solid #4b5563;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    z-index: 9998;
  }
  #bottom-nav .nav-link {
    display: flex;
    align-items: center;
    gap: 7px;
    background: #374151;
    border: 1.5px solid #6b7280;
    border-radius: 10px;
    color: #d1d5db;
    font-size: 14px;
    font-weight: 600;
    text-decoration: none;
    padding: 0 14px;
    height: 32px;
    letter-spacing: 0.5px;
    transition: background 0.15s, color 0.15s;
  }
  #bottom-nav .nav-link:hover { background: #4b5563; color: #fff; }
  #bottom-nav .nav-link .nav-icon {
    width: 22px; height: 22px;
    background: #6b7280;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  #bottom-nav .nav-link .nav-icon svg { fill: #fff; }
  #fullscreen-btn {
    background: #374151;
    color: #f3f4f6;
    border: 1.5px solid #6b7280;
    border-radius: 8px;
    width: 32px;
    height: 32px;
    cursor: pointer;
    font-size: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #fullscreen-btn:hover { background: #4b5563; }

  /* ── Page visibility ── */
  .page { display: none; }
  .page.active { display: block; }

  /* ── Patient List page ── */
  #page-patients .subtitle {
    text-align: center;
    color: #f59e0b;
    font-size: 20px;
    font-weight: 700;
    padding: 6px 0 16px;
  }
  .patient-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    padding: 0 20px 24px;
  }
  .patient-btn {
    background: #374151;
    border: none;
    border-radius: 12px;
    padding: 12px 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 13px;
    min-height: 80px;
    transition: background 0.15s;
  }
  .patient-btn:hover { background: #4b5563; }
  .patient-btn.empty { cursor: default; background: #374151; opacity: 0.5; }
  .patient-btn .pat-icon {
    width: 28px; height: 28px;
    background: #6b7280; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .patient-btn .pat-icon svg { fill: #d1d5db; }
  .patient-btn .pat-info { text-align: left; }
  .patient-btn .pat-info .pid { font-size: 16px; color: #d1d5db; }
  .patient-btn .pat-info .pname { font-size: 20px; font-weight: 700; color: #fff; }
  .patient-btn .pat-gender {
    margin-left: auto;
    font-size: 16px; font-weight: 700; color: #d1d5db;
  }

  /* ── Title-only topbar for list page ── */
  .title-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px 4px;
  }
  .title-bar .title-text {
    position: absolute; left: 50%; transform: translateX(-50%);
    font-size: 20px; font-weight: 700; color: #fff;
  }

  /* ── Patient Hub page ── */
  .hub-body { padding: 14px 20px 22px; }
  .hub-main-btns {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 22px;
  }
  .hub-btn {
    background: #374151;
    border: 2px solid #6b7280;
    border-radius: 12px;
    color: #fff;
    font-size: 18px;
    font-weight: 600;
    text-align: center;
    padding: 16px 8px;
    cursor: pointer;
    line-height: 1.3;
    transition: background 0.15s;
  }
  .hub-btn:hover { background: #4b5563; }

  .task-section-label {
    text-align: center;
    color: #f59e0b;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 2px;
    margin-bottom: 12px;
  }
  .hub-task-btns {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .task-btn {
    background: #f59e0b;
    border: none;
    border-radius: 12px;
    color: #1f2937;
    font-size: 16px;
    font-weight: 700;
    text-align: center;
    padding: 18px 8px;
    cursor: pointer;
    line-height: 1.3;
    transition: background 0.15s;
  }
  .task-btn:hover { background: #d97706; }

  /* ── Two-panel layout for Virtual Actions / Diagnostics / Bedside ── */
  .two-panel {
    display: flex;
    min-height: 340px;
  }
  .left-panel {
    width: 160px;
    flex-shrink: 0;
    padding: 10px 12px 16px;
    border-right: 1px solid #6b7280;
  }
  .left-panel .section-title {
    color: #f59e0b;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 10px;
  }
  .left-tab {
    background: #374151;
    border: none;
    border-radius: 10px;
    color: #d1d5db;
    font-size: 16px;
    font-weight: 600;
    text-align: center;
    padding: 13px 10px;
    cursor: pointer;
    width: 100%;
    margin-bottom: 6px;
    line-height: 1.6;
    transition: background 0.15s;
  }
  .left-tab:hover { background: #4b5563; }
  .left-tab.active {
    background: #fff;
    color: #1f2937;
  }

  .right-panel {
    flex: 1;
    padding: 14px 16px 16px;
  }
  .action-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .action-btn {
    background: #374151;
    border: 1.5px solid #6b7280;
    border-radius: 12px;
    color: #fff;
    font-size: 16px;
    font-weight: 600;
    text-align: left;
    padding: 13px 14px 22px;
    cursor: pointer;
    position: relative;
    line-height: 1.3;
    transition: background 0.15s;
    min-height: 60px;
  }
  .action-btn:hover { background: #4b5563; }
  .action-btn .qty {
    position: absolute;
    bottom: 6px; right: 10px;
    font-size: 12px;
    font-weight: 700;
    color: #f59e0b;
  }

  /* ── Transfer page ── */
  #page-transfer .card-inner {
    padding: 30px 28px 22px;
    text-align: center;
  }
  #page-transfer .transfer-label {
    font-size: 18px; color: #d1d5db; margin-bottom: 4px;
  }
  #page-transfer .transfer-name {
    font-size: 30px; font-weight: 800; color: #fff; margin-bottom: 28px;
  }
  .transfer-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 22px;
  }
  .transfer-btn {
    background: #374151;
    border: 1.5px solid #6b7280;
    border-radius: 12px;
    color: #fff;
    font-size: 18px;
    font-weight: 700;
    padding: 22px 8px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .transfer-btn:hover { background: #4b5563; }
  .cancel-link {
    background: none; border: none;
    color: #d1d5db;
    font-size: 16px;
    text-decoration: underline;
    cursor: pointer;
  }
  .cancel-link:hover { color: #fff; }

  /* ── Task Trainer modal overlay ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: #4b5563;
    border-radius: 18px;
    padding: 32px 40px 28px;
    text-align: center;
    min-width: 280px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
  }
  .modal-box .modal-title {
    font-size: 18px; color: #d1d5db; margin-bottom: 6px;
  }
  .modal-box .modal-patient {
    font-size: 22px; font-weight: 700; color: #fff; margin-bottom: 18px;
  }
  .modal-box .modal-msg {
    font-size: 16px; color: #f59e0b; font-weight: 600; margin-bottom: 28px;
  }
  .modal-cancel {
    background: none; border: none;
    color: #d1d5db; font-size: 16px;
    text-decoration: underline; cursor: pointer;
  }
  .modal-cancel:hover { color: #fff; }

  /* ── Bedside PoC ── */
  .bedside-right {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    align-content: start;
  }
</style>
</head>
<body>

<div class="card page" id="page-hub">

      <div class="pat-name" id="hub-pname"></div>

    <div class="topbar-left">
      <button class="nav-btn" onclick="goTo('page-patients')" title="Patients">
        <div class="icon">

        <span>Activities</span>
      </button>
    </div>
    <div class="topbar-center">
      <div class="pat-id" id="act-pid"></div>
      <div class="pat-name" id="act-pname"></div>
    </div>

      <button class="minimize-btn" title="Minimize" onclick="minimisePage(this)">_</button>
    </div>
  </div>
  <div class="two-panel">
    <div class="left-panel">
      <div class="section-title">Virtual Actions</div>
      <button class="left-tab active" id="tab-vitals"      onclick="switchTab('vitals')">Vitals</button>
      <button class="left-tab"        id="tab-iv"          onclick="switchTab('iv')">IV / Injections</button>
      <button class="left-tab"        id="tab-dressing"    onclick="switchTab('dressing')">Dressing /<br>Splints</button>
      <button class="left-tab"        id="tab-supp"        onclick="switchTab('supp')">Supplemental<br>O2</button>
      <button class="left-tab"        id="tab-intubation"  onclick="switchTab('intubation')">Intubation /<br>Chest Tube</button>
      <button class="left-tab"        id="tab-others"      onclick="switchTab('others')">Others</button>
    </div>
    <div class="right-panel" id="actions-content">
      <!-- Filled dynamically -->
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════

      '</div>';
  }

  function switchDiagTab(tabKey) {
    ['imaging','lab'].forEach(k => {
      document.getElementById('dtab-' + k).classList.toggle('active', k === tabKey);
    });
    document.getElementById('diagnostics-content').innerHTML = renderDiagGrid(DIAG[tabKey]);
  }

  /* ── Transfer ── */
  function confirmTransfer(destination) {
    const p = PATIENTS[currentPatient];
    alert('Patient ' + p.id + ' ' + p.name[0] + p.name.slice(1).toLowerCase() +
          ' transferred to ' + destination + '.');
    goTo('page-patients');
  }

  /* ── Task Trainer modal ── */
  function openModal(taskName) {
    const p = PATIENTS[currentPatient];
    document.getElementById('modal-task-title').textContent = taskName;
    document.getElementById('modal-patient-name').textContent = p.id + ' ' + p.name[0] + p.name.slice(1).toLowerCase();
    document.getElementById('task-modal').classList.add('open');
  }
  function closeModal() {
    document.getElementById('task-modal').classList.remove('open');
  }

  /* ── Init ── */
  renderTaskBtns();
  switchTab('vitals');
  switchDiagTab('imaging');
</script>
</body>
</html>
